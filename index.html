<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors-Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<section class="container">
 <div class="resultField">
    <div class="resultImages">
        <span class="userResult">
            <img id="userImage" src="./images/rock.png" alt="User Choice">
        </span>
        <span class="compResult">
            <img id="compImage" src="./images/rock.png" alt="Computer Choice">
        </span>

    
    </div>    <div class="result">Let's play</div>
 </div>
 <div class="optionsImages">
    <span class="optionImage">
        <img id="rock" src="./images/rock.png" alt="Rock">
        <p>Rock</p>
    </span>
    <span class="optionImage">
        <img id="paper" src="./images/paper.png" alt="Paper">
        <p>Paper</p>
    </span>
    <span class="optionImage">
        <img id="scissors" src="./images/scissors.png" alt="Scissors">
        <p>Scissors</p>
    </span>
 </div>
</section>




 
    <script src="./script.js"></script>
</body>
</html>
